  <h1>Fibonacci I guess</h1>
  <p>Let \(S_n\) be a Fibonacci-like sequence with start numbers \(a\) and \(b)\.</p>
  <p>\(S_1 = a\) and \(S_2 = b\)</p>
  <p>\(S_3 = a + b\)</p></p>
  <p>\(S_4 = S_2 + S_3 = b + a + b = a + 2b\)</p>
  <p>\(S_n = aF_{n-1} + bF_n\)</p>
