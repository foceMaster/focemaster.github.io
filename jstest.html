<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Specific Line from Text File</title>
</head>
<body>
    <h2>Select a .txt file</h2>
    <input type="file" id="fileInput" accept=".txt">
    
    <h3>Enter a line number:</h3>
    <input type="number" id="lineNumberInput" min="1">
    <button id="showLineButton">Show Line</button>

    <p><strong>Selected Line:</strong></p>
    <pre id="output"></pre>

    <script src="fileReader.js"></script> <!-- Link to the fileReader.js -->
    <script>
        document.getElementById("showLineButton").addEventListener("click", function() {
            const fileInput = document.getElementById("fileInput");
            const lineNumber = parseInt(document.getElementById("lineNumberInput").value);

            if (!fileInput.files[0]) {
                alert("Please select a file.");
                return;
            }

            if (isNaN(lineNumber) || lineNumber < 1) {
                alert("Please enter a valid line number.");
                return;
            }

            const file = fileInput.files[0];
            getLineByNumber(file, lineNumber, function(line) {
                document.getElementById("output").textContent = line; // Display the line
            });
        });
    </script>
</body>
</html>
