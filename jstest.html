<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plot Point on Circle</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 50px;
        }
        canvas {
            border: 1px solid black;
            margin-top: 20px;
        }
        .input-group {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="input-group" id="question-container">
        <label for="input">Enter Radius:</label>
        <input type="number" id="input" step="any">
    </div>
    <button id="submit-btn">Submit</button>
    <canvas id="circleCanvas" width="400" height="400"></canvas>

    <script>
        let step = 1;
        let radius = 0;
        let angle = 0;

        document.getElementById('submit-btn').addEventListener('click', handleInput);

        // Initial plot with the two circles and the origin point
        drawBase();

        function handleInput() {
            const inputValue = parseFloat(document.getElementById('input').value);

            if (step === 1) {
                radius = inputValue;
                step++;
                updateQuestion('Enter Angle (in degrees):');
            } else if (step === 2) {
                angle = inputValue;
                plot();
            }
        }

        function updateQuestion(question) {
            const label = document.querySelector('#question-container label');
            label.textContent = question;
            document.getElementById('input').value = '';
        }

        function drawBase() {
            const canvas = document.getElementById('circleCanvas');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // Clear the canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw the two fixed circles
            ctx.beginPath();
            ctx.arc(centerX, centerY, 100, 0, 2 * Math.PI);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(centerX, centerY, 200, 0, 2 * Math.PI);
            ctx.stroke();

            // Draw the origin point
            ctx.beginPath();
            ctx.arc(centerX, centerY, 5, 0, 2 * Math.PI);
            ctx.fillStyle = 'black';
            ctx.fill();
        }

        function plot() {
            const canvas = document.getElementById('circleCanvas');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // Convert angle to radians
            const angleInRadians = angle * (Math.PI / 180);

            // Calculate the Cartesian coordinates
            const x = radius * Math.cos(angleInRadians);
            const y = radius * Math.sin(angleInRadians);

            // Redraw the base circles and origin point
            drawBase();

            // Draw the new point
            ctx.beginPath();
            ctx.arc(centerX + x, centerY - y, 5, 0, 2 * Math.PI);
            ctx.fillStyle = 'red';
            ctx.fill();

            // Reset step and update question for the next input
            step = 1;
            updateQuestion('Enter Radius:');
        }
    </script>
</body>
</html>
