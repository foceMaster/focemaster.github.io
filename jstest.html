<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plot Point on Circle</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 50px;
        }
        canvas {
            margin-top: 20px;
            width: 400px; /* Display size */
            height: 400px; /* Display size */
        }
        .input-group {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="input-group" id="question-container">
        <label for="input">Enter Radius:</label>
        <input type="number" id="input" step="any">
    </div>
    <button id="submit-btn">Submit</button>
    <canvas id="circleCanvas" width="800" height="800"></canvas> <!-- Higher resolution -->
    <div id="result"></div>

    <script>
        const questions = [
            'Enter Radius:',
            'Enter Angle (in degrees):',
            'Enter another number:',
            'Enter one more number:'
        ];
        let answers = [];
        let currentQuestion = 0;

        document.getElementById('submit-btn').addEventListener('click', handleInput);

        // Initial plot with the two circles and the origin point
        drawBase();

        function handleInput() {
            const inputValue = parseFloat(document.getElementById('input').value);

            if (!isNaN(inputValue)) {
                answers.push(inputValue);
                currentQuestion++;

                if (currentQuestion < questions.length) {
                    updateQuestion();
                } else {
                    performCalculations();
                    plot();
                }
            }
        }

        function updateQuestion() {
            const label = document.querySelector('#question-container label');
            label.textContent = questions[currentQuestion];
            document.getElementById('input').value = '';
        }

        function drawBase() {
            const canvas = document.getElementById('circleCanvas');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // Clear the canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Set line width for smoother circles
            ctx.lineWidth = 2;

            // Draw the two fixed circles
            ctx.beginPath();
            ctx.arc(centerX, centerY, 100, 0, 2 * Math.PI);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(centerX, centerY, 200, 0, 2 * Math.PI);
            ctx.stroke();

            // Draw the origin point
            ctx.beginPath();
            ctx.arc(centerX, centerY, 5, 0, 2 * Math.PI);
            ctx.fillStyle = 'black';
            ctx.fill();
        }

        function plot() {
            const canvas = document.getElementById('circleCanvas');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            const radius = answers[0];
            const angle = answers[1];

            // Convert angle to radians
            const angleInRadians = angle * (Math.PI / 180);

            // Calculate the Cartesian coordinates
            const x = radius * Math.cos(angleInRadians);
            const y = radius * Math.sin(angleInRadians);

            // Redraw the base circles and origin point
            drawBase();

            // Draw the new point
            ctx.beginPath();
            ctx.arc(centerX + x, centerY - y, 5, 0, 2 * Math.PI);
            ctx.fillStyle = 'red';
            ctx.fill();

            // Display results
            displayResults();
        }

        function performCalculations() {
            // Example calculations using answers
            const sum = answers.reduce((acc, value) => acc + value, 0);
            const product = answers.reduce((acc, value) => acc * value, 1);
            const average = sum / answers.length;

            // You can perform other calculations as needed

            // Display results
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <p>Sum: ${sum}</p>
                <p>Product: ${product}</p>
                <p>Average: ${average}</p>
            `;
        }

        // Initialize the first question
        updateQuestion();
    </script>
</body>
</html>
