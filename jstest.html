<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plot Point on Circle</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 50px;
        }
        canvas {
            border: 1px solid black;
            margin-top: 20px;
        }
        .input-group {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="input-group">
        <label for="radius">Radius:</label>
        <input type="number" id="radius" step="any">
    </div>
    <div class="input-group">
        <label for="angle">Angle (in degrees):</label>
        <input type="number" id="angle" step="any">
    </div>
    <button onclick="plotPoint()">Plot Point</button>
    <canvas id="circleCanvas" width="400" height="400"></canvas>

    <script>
        function plotPoint() {
            // Get the input values
            const radius = parseFloat(document.getElementById('radius').value);
            const angle = parseFloat(document.getElementById('angle').value);

            // Convert angle to radians
            const angleInRadians = angle * (Math.PI / 180);

            // Calculate the Cartesian coordinates
            const x = radius * Math.cos(angleInRadians);
            const y = radius * Math.sin(angleInRadians);

            // Get the canvas and context
            const canvas = document.getElementById('circleCanvas');
            const ctx = canvas.getContext('2d');

            // Clear the canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw the circle
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.stroke();

            // Draw the point
            ctx.beginPath();
            ctx.arc(centerX + x, centerY - y, 5, 0, 2 * Math.PI);
            ctx.fillStyle = 'red';
            ctx.fill();
        }
    </script>
</body>
</html>
