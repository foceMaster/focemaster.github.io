<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plot Points on Circle</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 50px;
        }
        canvas {
            margin-top: 20px;
            width: 400px; /* Display size */
            height: 400px; /* Display size */
        }
        .input-group {
            margin: 10px 0;
            text-align: center;
        }
        .button-group {
            display: flex;
            flex-direction: column;
        }
        .button-group button {
            margin: 5px;
            padding: 10px 20px;
            font-size: 16px;
        }
        #end-screen {
            display: none;
        }
    </style>
</head>
<body>
    <div class="input-group" id="question-container">
        <p id="question-text">Question will appear here</p>
        <div id="button-group" class="button-group">
            <!-- Buttons will be inserted here by JavaScript -->
        </div>
    </div>
    <canvas id="circleCanvas" width="400" height="400"></canvas> <!-- Adjusted size -->
    <div id="result"></div>
    <div id="end-screen">
        <h2>Thank you for completing the questions!</h2>
        <p>Check the results above.</p>
    </div>

    <script>
        const questionData = [
            {
                text: 'Question 1:',
                points: { type1: 10, type2: 20, type3: 30, type4: 40 },
                options: ['yes', 'no', 'maybe']
            },
            {
                text: 'Question 2:',
                points: { type1: 15, type2: 25, type3: 35, type4: 45 },
                options: ['yes', 'no', 'maybe']
            },
            {
                text: 'Question 3:',
                points: { type1: 20, type2: 30, type3: 40, type4: 50 },
                options: ['yes', 'no', 'maybe']
            },
            {
                text: 'Question 4:',
                points: { type1: 25, type2: 35, type3: 45, type4: 55 },
                options: ['yes', 'no', 'maybe']
            }
        ];

        let answers = [];
        let currentQuestion = 0;

        // Initial plot with the two circles, the origin point, and three points on the edge
        drawBase();

        function handleOptionSelection(option) {
            if (currentQuestion < questionData.length) {
                answers.push(option);
                currentQuestion++;

                if (currentQuestion < questionData.length) {
                    updateQuestion();
                } else {
                    performCalculations();
                    plot();
                    showEndScreen();
                }
            }
        }

        function updateQuestion() {
            const question = questionData[currentQuestion];
            document.getElementById('question-text').textContent = question.text;

            const buttonGroup = document.getElementById('button-group');
            buttonGroup.innerHTML = '';

            question.options.forEach(option => {
                const button = document.createElement('button');
                button.textContent = option.charAt(0).toUpperCase() + option.slice(1);
                button.addEventListener('click', () => handleOptionSelection(option));
                buttonGroup.appendChild(button);
            });
        }

        function drawBase() {
            const canvas = document.getElementById('circleCanvas');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const innerRadius = 100;
            const outerRadius = 200;

            // Clear the canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Set line width for smoother circles
            ctx.lineWidth = 2;

            // Draw the two fixed circles
            ctx.beginPath();
            ctx.arc(centerX, centerY, innerRadius, 0, 2 * Math.PI);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(centerX, centerY, outerRadius, 0, 2 * Math.PI);
            ctx.stroke();

            // Draw the origin point
            ctx.beginPath();
            ctx.arc(centerX, centerY, 5, 0, 2 * Math.PI);
            ctx.fillStyle = 'black';
            ctx.fill();

            // Draw three points on the circumference of the outer circle, spaced 120° apart
            const points = [0, 120, 240]; // Angles in degrees
            const pointRadius = 5;
            window.edgePoints = [];

            points.forEach(angle => {
                const angleInRadians = angle * (Math.PI / 180);
                const x = centerX + outerRadius * Math.cos(angleInRadians);
                const y = centerY - outerRadius * Math.sin(angleInRadians);
                window.edgePoints.push({ x, y });

                // Draw the point
                ctx.beginPath();
                ctx.arc(x, y, pointRadius, 0, 2 * Math.PI);
                ctx.fillStyle = 'blue';
                ctx.fill();
            });
        }

        function plot() {
            const canvas = document.getElementById('circleCanvas');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            const radius = calculateRadius();
            const angle = calculateAngle();

            // Convert angle to radians
            const angleInRadians = angle * (Math.PI / 180);

            // Calculate the Cartesian coordinates
            const x = radius * Math.cos(angleInRadians);
            const y = radius * Math.sin(angleInRadians);

            // Redraw the base circles and origin point
            drawBase();

            // Draw the new point
            ctx.beginPath();
            ctx.arc(centerX + x, centerY - y, 5, 0, 2 * Math.PI);
            ctx.fillStyle = 'red';
            ctx.fill();

            // Display results
            displayResults();
        }

        function performCalculations() {
            let totalPoints = { type1: 0, type2: 0, type3: 0, type4: 0 };

            answers.forEach((answer, index) => {
                const question = questionData[index];
                const points = question.points;

                switch (answer) {
                    case 'yes':
                        Object.keys(points).forEach(type => {
                            totalPoints[type] += points[type];
                        });
                        break;
                    case 'no':
                        Object.keys(points).forEach(type => {
                            totalPoints[type] -= points[type];
                        });
                        break;
                    case 'maybe':
                        // No change for 'maybe'
                        break;
                }
            });

            // Store results for later use
            window.totalPoints = totalPoints;
        }

        function calculateRadius() {
            // Radius is the number of points in the fourth question
            const totalPoints = window.totalPoints || {};
            return Math.min(200, totalPoints.type4 || 0); // Ensure radius does not exceed 200
        }

        function calculateAngle() {
            // Calculate angle based on the weighted sum of point coordinates
            const totalPoints = window.totalPoints || {};
            let angle = 0;

            const centerX = 400 / 2; // centerX of the canvas
            const centerY = 400 / 2; // centerY of the canvas

            window.edgePoints.forEach((point, index) => {
                const pointType = `type${index + 1}`;
                if (totalPoints[pointType]) {
                    angle += totalPoints[pointType] * Math.atan2(point.y - centerY, point.x - centerX) * (180 / Math.PI);
                }
            });

            // Ensure angle is within 0° to 360°
            angle = angle % 360;
            return angle;
        }

        function displayResults() {
            const resultDiv = document.getElementById('result');
            const radius = calculateRadius();
            const angle = calculateAngle();
            
            resultDiv.innerHTML = `
                <p>Calculated Radius: ${radius}</p>
                <p>Calculated Angle: ${angle} degrees</p>
            `;
        }

        function showEndScreen() {
            document.getElementById('question-container').style.display = 'none';
            document.getElementById('end-screen').style.display = 'block';
        }

        // Initialize the first question
        updateQuestion();
    </script>
</body>
</html>
