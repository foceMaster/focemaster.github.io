<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Read First Line of File</title>
</head>
<body>
    <h2>Select a .txt file</h2>
    <input type="file" id="fileInput" accept=".txt">
    <p><strong>First line:</strong></p>
    <pre id="output"></pre>

    <script>
        document.getElementById("fileInput").addEventListener("change", function(event) {
            const file = event.target.files[0]; // Get the selected file
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                const firstLine = content.split(/\r?\n/)[0]; // Get the first line
                document.getElementById("output").textContent = firstLine; // Display first line
            };
            reader.readAsText(file); // Read file as text
        });
    </script>
</body>
</html>
