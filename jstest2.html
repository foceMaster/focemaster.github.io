<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Folder as ZIP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <button onclick="downloadZip()">Download Folder</button>

    <script>
        function downloadZip() {
            const zip = new JSZip();

            // Create a folder structure inside the ZIP
            const folder = zip.folder("MyFolder");
            folder.file("file1.txt", "Hello, this is file 1.");
            folder.file("file2.txt", "This is file 2 inside MyFolder.");

            // Add a nested folder
            const subFolder = folder.folder("SubFolder");
            subFolder.file("file3.txt", "This is inside SubFolder.");

            // Generate the ZIP and trigger download
            zip.generateAsync({ type: "blob" }).then(function (content) {
                const a = document.createElement("a");
                a.href = URL.createObjectURL(content);
                a.download = "MyFolder.zip";
                a.click();
            });
        }
    </script>
</body>
</html>
